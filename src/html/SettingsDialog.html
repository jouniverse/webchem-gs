<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Google Sans", Roboto, Arial, sans-serif;
        font-size: 13px;
        color: #202124;
        padding: 16px;
      }
      h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .section {
        margin-bottom: 20px;
      }
      .input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
      }
      label {
        display: block;
        font-size: 12px;
        color: #5f6368;
        margin-bottom: 4px;
      }
      input[type="text"] {
        flex: 1;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        outline: none;
      }
      input[type="text"]:focus {
        border-color: #1a73e8;
      }
      .btn {
        padding: 6px 14px;
        font-size: 13px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        white-space: nowrap;
      }
      .btn-primary {
        background: #1a73e8;
        color: #fff;
      }
      .btn-primary:hover {
        background: #1765cc;
      }
      .status {
        font-size: 12px;
        color: #5f6368;
        margin-top: 4px;
      }
      .status.ok {
        color: #1e8e3e;
      }
      .status.err {
        color: #d93025;
      }
      .text-muted {
        font-size: 12px;
        color: #80868b;
        line-height: 1.4;
      }
      .about {
        border-top: 1px solid #e8eaed;
        padding-top: 12px;
      }
      a {
        color: #1a73e8;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .key-row {
        margin-bottom: 12px;
      }
      .key-row label {
        margin-bottom: 3px;
      }
      .hint {
        font-size: 11px;
        color: #80868b;
      }
    </style>
  </head>
  <body>
    <!-- ═══ API Keys ═══ -->
    <div class="section">
      <h3>API Keys</h3>
      <p class="text-muted" style="margin-bottom: 10px">
        Keys are stored in Script Properties. Leave blank to clear.
      </p>

      <div class="key-row">
        <label>Gemini API Key <span class="hint">(Identify tab)</span></label>
        <div class="input-row">
          <input type="text" id="key-GEMINI_API_KEY" placeholder="Not set" />
          <button class="btn btn-primary" onclick="saveKey('GEMINI_API_KEY')">
            Save
          </button>
        </div>
        <div class="status" id="status-GEMINI_API_KEY"></div>
      </div>

      <div class="key-row">
        <label
          >COCONUT API Key
          <span class="hint">(Search tab — COCONUT)</span></label
        >
        <div class="input-row">
          <input type="text" id="key-COCONUT_API_KEY" placeholder="Not set" />
          <button class="btn btn-primary" onclick="saveKey('COCONUT_API_KEY')">
            Save
          </button>
        </div>
        <div class="status" id="status-COCONUT_API_KEY"></div>
      </div>

      <div class="key-row">
        <label
          >Springer Nature Meta API Key
          <span class="hint">(Research tab — Springer)</span></label
        >
        <div class="input-row">
          <input type="text" id="key-META_API_KEY" placeholder="Not set" />
          <button class="btn btn-primary" onclick="saveKey('META_API_KEY')">
            Save
          </button>
        </div>
        <div class="status" id="status-META_API_KEY"></div>
      </div>

      <div class="key-row">
        <label
          >Zenodo Access Token
          <span class="hint">(Research tab — Zenodo, optional)</span></label
        >
        <div class="input-row">
          <input type="text" id="key-ZENODO_API_KEY" placeholder="Not set" />
          <button class="btn btn-primary" onclick="saveKey('ZENODO_API_KEY')">
            Save
          </button>
        </div>
        <div class="status" id="status-ZENODO_API_KEY"></div>
      </div>
    </div>

    <!-- ═══ About ═══ -->
    <div class="section about">
      <h3>About</h3>
      <p class="text-muted">
        <strong>webchem-gs</strong> — Chemistry data tools for Google Sheets.<br />
        Sources include:
        <a href="https://pubchem.ncbi.nlm.nih.gov/" target="_blank">PubChem</a>,
        <a href="https://www.ebi.ac.uk/chembl/" target="_blank">ChEMBL</a>,
        <a href="https://www.ebi.ac.uk/chebi/" target="_blank">ChEBI</a>,
        <a href="https://opsin.ch.cam.ac.uk/" target="_blank">OPSIN</a>,
        <a href="https://cactus.nci.nih.gov/chemical/structure" target="_blank"
          >CIR</a
        >, <a href="http://cts.fiehnlab.ucdavis.edu/" target="_blank">CTS</a>,
        <a href="https://commonchemistry.cas.org/" target="_blank"
          >CAS Common Chemistry</a
        >,
        <a href="https://goldbook.iupac.org/" target="_blank">IUPAC Gold Book</a
        >,
        <a href="https://webbook.nist.gov/" target="_blank"
          >NIST Chemistry WebBook</a
        >.<br />
        Inspired by the
        <a href="https://github.com/ropensci/webchem" target="_blank"
          >webchem</a
        >
        R package.
      </p>
    </div>

    <script>
      // Load existing key status on open
      google.script.run
        .withSuccessHandler(function (keys) {
          var ids = [
            "GEMINI_API_KEY",
            "COCONUT_API_KEY",
            "META_API_KEY",
            "ZENODO_API_KEY",
          ];
          ids.forEach(function (id) {
            var el = document.getElementById("status-" + id);
            if (keys[id]) {
              el.textContent = "Configured (" + keys[id] + ")";
              el.className = "status ok";
            } else {
              el.textContent = "Not set";
              el.className = "status";
            }
          });
        })
        .getResearchApiKeys();

      function saveKey(propKey) {
        var input = document.getElementById("key-" + propKey);
        var status = document.getElementById("status-" + propKey);
        var value = input.value.trim();

        status.textContent = "Saving…";
        status.className = "status";

        google.script.run
          .withSuccessHandler(function () {
            input.value = "";
            if (value) {
              status.textContent = "Saved (••••" + value.slice(-4) + ")";
              status.className = "status ok";
            } else {
              status.textContent = "Cleared";
              status.className = "status";
            }
          })
          .withFailureHandler(function (err) {
            status.textContent = "Error: " + err.message;
            status.className = "status err";
          })
          .saveApiKey(propKey, value);
      }
    </script>
  </body>
</html>
